version: '3.8'

services:
  api:
    build: .
    container_name: portfolio-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # - DATABASE_URL=postgres://... (Provided by your .env)
      # - JWT_SECRET=...
    env_file:
      - .env
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
